<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Quality Checklist</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            /* Subtle dot pattern for a premium "analytical" backdrop */
            background-color: #f8fafc;
            background-image: radial-gradient(#cbd5e1 1px, transparent 1px);
            background-size: 24px 24px;
        }
        
        /* Smooth transitions for card elements */
        .fade-in {
            animation: fadeIn 0.3s ease-in-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="text-slate-800 min-h-screen flex flex-col justify-between selection:bg-emerald-200 selection:text-emerald-900">

    <!-- Small Header -->
    <header class="py-6 px-4 max-w-lg mx-auto w-full flex items-center justify-between">
        <div class="flex items-center gap-3">
            <a href="https://vinc88investing-cmyk.github.io/Tools/" class="flex items-center justify-center w-9 h-9 bg-white rounded-full shadow-sm border border-slate-200/60 text-slate-400 hover:text-emerald-600 hover:border-emerald-300 hover:-translate-y-0.5 transition-all" title="Back to Tools">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
                </svg>
            </a>
            <div class="flex items-center gap-2.5 bg-white py-2 px-4 rounded-full shadow-sm border border-slate-200/60">
                <span class="w-2.5 h-2.5 rounded-full bg-emerald-500 shadow-[0_0_8px_rgba(16,185,129,0.5)]"></span>
                <span class="text-xs font-bold tracking-widest uppercase text-slate-600">Stock Checklist</span>
            </div>
        </div>
        <button id="quick-reset" onclick="resetAnalyzer()" class="hidden text-xs font-semibold text-slate-400 hover:text-slate-700 bg-white py-2 px-4 rounded-full shadow-sm border border-slate-200/60 transition-colors">
            Start Over
        </button>
    </header>

    <!-- Main Card -->
    <main class="flex-grow flex items-center justify-center p-4">
        <div class="max-w-md w-full bg-white border border-slate-200/80 rounded-[2rem] p-8 shadow-[0_20px_50px_-12px_rgba(0,0,0,0.05)] space-y-8 relative overflow-hidden">
            
            <!-- Decorative gradient orb -->
            <div class="absolute -top-24 -right-24 w-48 h-48 bg-emerald-100 rounded-full mix-blend-multiply filter blur-3xl opacity-50"></div>

            <!-- Step Indicators -->
            <div id="steps-indicator" class="hidden flex justify-center gap-3 relative z-10">
                <span class="dot w-2.5 h-2.5 rounded-full bg-slate-200 transition-colors duration-300"></span>
                <span class="dot w-2.5 h-2.5 rounded-full bg-slate-200 transition-colors duration-300"></span>
                <span class="dot w-2.5 h-2.5 rounded-full bg-slate-200 transition-colors duration-300"></span>
                <span class="dot w-2.5 h-2.5 rounded-full bg-slate-200 transition-colors duration-300"></span>
                <span class="dot w-2.5 h-2.5 rounded-full bg-slate-200 transition-colors duration-300"></span>
            </div>

            <!-- Ticker Entry Screen -->
            <div id="screen-ticker" class="space-y-8 relative z-10 fade-in">
                <div class="text-center space-y-3">
                    <h2 class="text-3xl font-black text-slate-900 tracking-tight">Stock Checklist</h2>
                    <p class="text-sm font-medium text-slate-500">Enter a ticker to start the 5-step test.</p>
                </div>
                
                <div class="space-y-5">
                    <div class="relative">
                        <input type="text" id="input-ticker" placeholder="e.g. AAPL" class="w-full bg-slate-50 border border-slate-200 rounded-2xl px-4 py-5 text-center text-2xl font-black text-slate-900 placeholder-slate-400 uppercase focus:outline-none focus:border-emerald-500 focus:ring-4 focus:ring-emerald-500/10 transition-all shadow-inner">
                    </div>
                    
                    <button onclick="startAnalysis()" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-5 px-4 rounded-2xl text-sm uppercase tracking-widest transition-all shadow-[0_8px_16px_-4px_rgba(16,185,129,0.3)] hover:shadow-[0_12px_20px_-4px_rgba(16,185,129,0.4)] hover:-translate-y-0.5 active:translate-y-0">
                        Begin Checklist
                    </button>
                </div>
            </div>

            <!-- Question Screen -->
            <div id="screen-questions" class="hidden space-y-8 relative z-10">
                <div class="text-center space-y-5">
                    <span id="active-ticker" class="inline-block text-xs px-4 py-1.5 bg-emerald-50 border border-emerald-200 rounded-full text-emerald-700 font-bold uppercase tracking-widest shadow-sm">AAPL</span>
                    <h3 id="question-text" class="text-2xl font-bold text-slate-900 tracking-tight leading-snug px-2">S&P 500 Top 150?</h3>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <button onclick="handleAnswer(true)" class="group flex flex-col items-center justify-center py-8 bg-white hover:bg-emerald-50 border-2 border-slate-100 hover:border-emerald-400 rounded-2xl transition-all shadow-sm hover:shadow-md hover:-translate-y-1">
                        <span class="text-2xl font-black text-slate-400 group-hover:text-emerald-600 transition-colors">YES</span>
                    </button>
                    
                    <button onclick="handleAnswer(false)" class="group flex flex-col items-center justify-center py-8 bg-white hover:bg-rose-50 border-2 border-slate-100 hover:border-rose-400 rounded-2xl transition-all shadow-sm hover:shadow-md hover:-translate-y-1">
                        <span class="text-2xl font-black text-slate-400 group-hover:text-rose-600 transition-colors">NO</span>
                    </button>
                </div>
            </div>

            <!-- Results Screen -->
            <div id="screen-summary" class="hidden space-y-8 relative z-10">
                <div class="text-center space-y-2">
                    <h2 class="text-2xl font-black text-slate-900 tracking-tight" id="summary-ticker">AAPL Analysis</h2>
                    <p class="text-sm font-medium text-slate-500">Final Score Card</p>
                </div>

                <div id="summary-card" class="p-8 rounded-2xl text-center space-y-3 transition-colors duration-500">
                    <div class="text-7xl font-black tracking-tighter" id="score-text">0/5</div>
                    <div class="text-sm font-bold tracking-widest uppercase" id="verdict-label">NOT INVESTABLE</div>
                </div>

                <div class="bg-slate-50 rounded-2xl border border-slate-100 p-2">
                    <div id="breakdown-list" class="divide-y divide-slate-200/60 text-sm font-medium">
                        <!-- Summary items load here dynamically -->
                    </div>
                </div>

                <button onclick="resetAnalyzer()" class="w-full bg-white hover:bg-slate-50 border-2 border-slate-200 text-slate-700 font-bold py-4 rounded-2xl text-xs uppercase tracking-widest transition-all shadow-sm hover:shadow hover:border-slate-300">
                    Check Another Stock
                </button>
            </div>

        </div>
    </main>

    <!-- Tiny Footer -->
    <footer class="py-8 text-center text-slate-500 text-xs font-medium space-y-2 px-4">
        <p class="text-slate-700 font-semibold">Simple 5-Step Evaluation Framework</p>
        <p class="max-w-xs mx-auto leading-relaxed">Disclaimer: For educational purposes only. This tool does not provide financial or investment advice.</p>
    </footer>

    <script>
        const questions = [
            "Is the company in the S&P 500 Top 150?",
            "Does it possess a Wide Economic Moat?",
            "Great Financials? Double Digit EPS next 5Y?",
            "Is it currently Undervalued? (Margin of Safety)",
            "Great Charts? Uptrend or heavily Oversold?"
        ];

        let currentStep = 0;
        let ticker = "";
        let answers = [];

        // DOM Elements
        const screenTicker = document.getElementById("screen-ticker");
        const screenQuestions = document.getElementById("screen-questions");
        const screenSummary = document.getElementById("screen-summary");
        const stepsIndicator = document.getElementById("steps-indicator");
        const quickReset = document.getElementById("quick-reset");
        const inputTicker = document.getElementById("input-ticker");
        const activeTicker = document.getElementById("active-ticker");
        const questionText = document.getElementById("question-text");
        const summaryTicker = document.getElementById("summary-ticker");
        const scoreText = document.getElementById("score-text");
        const verdictLabel = document.getElementById("verdict-label");
        const summaryCard = document.getElementById("summary-card");
        const breakdownList = document.getElementById("breakdown-list");
        const dots = document.querySelectorAll(".dot");

        function triggerFade(element) {
            element.classList.remove('fade-in');
            void element.offsetWidth; // trigger reflow
            element.classList.add('fade-in');
        }

        function startAnalysis() {
            const val = inputTicker.value.trim().toUpperCase();
            if (!val) {
                inputTicker.focus();
                // Add a subtle shake or highlight effect for empty input
                inputTicker.classList.add('ring-4', 'ring-rose-500/20', 'border-rose-400');
                setTimeout(() => {
                    inputTicker.classList.remove('ring-4', 'ring-rose-500/20', 'border-rose-400');
                }, 1000);
                return;
            }
            ticker = val;
            currentStep = 1;
            answers = [];
            
            screenTicker.classList.add("hidden");
            screenQuestions.classList.remove("hidden");
            stepsIndicator.classList.remove("hidden");
            quickReset.classList.remove("hidden");

            triggerFade(screenQuestions);
            updateUI();
        }

        // Allow pressing Enter to start
        inputTicker.addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                event.preventDefault();
                startAnalysis();
            }
        });

        function updateUI() {
            // Update question card text
            questionText.innerText = questions[currentStep - 1];
            activeTicker.innerText = ticker;
            triggerFade(questionText);

            // Highlight status dots
            dots.forEach((dot, index) => {
                if (index < currentStep - 1) {
                    // Past steps
                    dot.className = "dot w-2.5 h-2.5 rounded-full bg-emerald-500 transition-all duration-300 shadow-[0_0_8px_rgba(16,185,129,0.5)]";
                } else if (index === currentStep - 1) {
                    // Current step
                    dot.className = "dot w-2.5 h-2.5 rounded-full bg-slate-800 ring-4 ring-slate-200 transition-all duration-300";
                } else {
                    // Future steps
                    dot.className = "dot w-2.5 h-2.5 rounded-full bg-slate-200 transition-all duration-300";
                }
            });
        }

        function handleAnswer(ans) {
            answers.push(ans);
            if (currentStep < 5) {
                currentStep++;
                updateUI();
            } else {
                showSummary();
            }
        }

        function showSummary() {
            screenQuestions.classList.add("hidden");
            stepsIndicator.classList.add("hidden");
            screenSummary.classList.remove("hidden");
            triggerFade(screenSummary);

            const yesCount = answers.filter(a => a === true).length;
            summaryTicker.innerText = `${ticker} Results`;
            scoreText.innerText = `${yesCount}/5`;

            // Adjust styles based on passing grade
            if (yesCount >= 4) {
                summaryCard.className = "p-8 rounded-2xl text-center space-y-3 bg-emerald-50 border border-emerald-200 shadow-inner";
                scoreText.className = "text-7xl font-black tracking-tighter text-emerald-600";
                verdictLabel.innerText = "INVESTABLE NOW";
                verdictLabel.className = "text-sm font-bold tracking-widest text-emerald-600 uppercase";
            } else {
                summaryCard.className = "p-8 rounded-2xl text-center space-y-3 bg-slate-50 border border-slate-200 shadow-inner";
                scoreText.className = "text-7xl font-black tracking-tighter text-slate-800";
                verdictLabel.innerText = "NOT INVESTABLE";
                verdictLabel.className = "text-sm font-bold tracking-widest text-slate-500 uppercase";
            }

            // Print the clean, simple breakdown
            breakdownList.innerHTML = "";
            questions.forEach((q, idx) => {
                const item = document.createElement("div");
                item.className = "px-4 py-3 flex items-center justify-between gap-4";
                const isYes = answers[idx];
                item.innerHTML = `
                    <span class="text-slate-600 leading-tight">${q}</span>
                    <span class="${isYes ? 'text-emerald-600 font-bold bg-emerald-100/50 px-2.5 py-1 rounded-md' : 'text-slate-400 font-bold bg-slate-100 px-2.5 py-1 rounded-md'} text-xs tracking-wide">
                        ${isYes ? 'YES' : 'NO'}
                    </span>
                `;
                breakdownList.appendChild(item);
            });
        }

        function resetAnalyzer() {
            currentStep = 0;
            ticker = "";
            answers = [];
            inputTicker.value = "";
            
            screenTicker.classList.remove("hidden");
            screenQuestions.classList.add("hidden");
            screenSummary.classList.add("hidden");
            stepsIndicator.classList.add("hidden");
            quickReset.classList.add("hidden");
            
            triggerFade(screenTicker);
            inputTicker.focus();
        }
    </script>
</body>
</html>
